name: Release Build

on:
  push:
    branches:
      - main
      - 'release/*'
      - '**'  # 支持所有分支
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      quality:
        description: 'Quality (oss, insider, stable)'
        required: false
        default: 'oss'
        type: choice
        options:
          - oss
          - insider
          - stable
      platforms:
        description: 'Platforms to build'
        required: false
        default: 'win32-x64'
        type: choice
        options:
          - win32-x64
          - win32-arm64
          - darwin
          - linux
      target:
        description: 'Target (user or system, Windows only)'
        required: false
        default: 'user'
        type: choice
        options:
          - user
          - system

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  VSCODE_QUALITY: ${{ github.event.inputs.quality || 'oss' }}

jobs:
  build-win32-x64:
    name: Build Windows x64
    runs-on: windows-2022
    if: >-
      (github.event_name == 'workflow_dispatch' && (contains('win32-x64,all', github.event.inputs.platforms) || github.event.inputs.platforms == '')) ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/heads/dependabot/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Prepare node_modules cache key
        shell: pwsh
        run: |
          mkdir .build -ea 0
          node build/azure-pipelines/common/computeNodeModulesCacheKey.ts win32 x64 $(node -p process.arch) > .build/packagelockhash

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        id: node-modules-cache
        with:
          path: .build/node_modules_cache
          key: "node_modules-windows-x64-${{ hashFiles('.build/packagelockhash') }}"

      - name: Extract node_modules cache
        if: steps.node-modules-cache.outputs.cache-hit == 'true'
        shell: pwsh
        run: 7z.exe x .build/node_modules_cache/cache.7z -aoa

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          for ($i = 1; $i -le 5; $i++) {
            try {
              npm ci
              break
            }
            catch {
              if ($i -eq 5) {
                Write-Error "npm ci failed after 5 attempts"
                throw
              }
              Write-Host "npm ci failed attempt $i, retrying..."
              Start-Sleep -Seconds 2
            }
          }
        env:
          npm_config_arch: x64
          npm_config_foreground_scripts: "true"
          VSCODE_ARCH: x64
          npm_config_build_from_source: "false"
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

      - name: Create node_modules archive
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          node build/azure-pipelines/common/listNodeModules.ts .build/node_modules_list.txt
          mkdir -Force .build/node_modules_cache
          7z.exe a .build/node_modules_cache/cache.7z -mx3 `@.build/node_modules_list.txt

      - name: Create .build folder
        shell: pwsh
        run: mkdir .build -ea 0

      - name: Prepare built-in extensions cache key
        shell: pwsh
        run: node build/azure-pipelines/common/computeBuiltInDepsCacheKey.ts > .build/builtindepshash

      - name: Restore built-in extensions cache
        id: cache-builtin-extensions
        uses: actions/cache/restore@v5
        with:
          enableCrossOsArchive: true
          path: .build/builtInExtensions
          key: "builtin-extensions-${{ hashFiles('.build/builtindepshash') }}"

      - name: Download built-in extensions
        if: steps.cache-builtin-extensions.outputs.cache-hit != 'true'
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile
        shell: pwsh
        run: npm run gulp compile

      - name: Build Windows x64 Application
        shell: pwsh
        run: npm run gulp vscode-win32-x64

      - name: Prepare Windows x64 Inno Updater
        shell: pwsh
        run: npm run gulp vscode-win32-x64-inno-updater

      - name: Build Windows x64 User Setup
        shell: pwsh
        run: npm run gulp vscode-win32-x64-user-setup

      - name: Build Windows x64 System Setup
        shell: pwsh
        run: npm run gulp vscode-win32-x64-system-setup

      - name: Upload User Setup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-win32-x64-user-setup
          path: .build/win32-x64/user-setup/*.exe

      - name: Upload System Setup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-win32-x64-system-setup
          path: .build/win32-x64/system-setup/*.exe

  build-win32-arm64:
    name: Build Windows arm64
    runs-on: windows-2022
    if: >-
      (github.event_name == 'workflow_dispatch' && (contains('win32-arm64,all', github.event.inputs.platforms) || github.event.inputs.platforms == '')) ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/heads/dependabot/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Prepare node_modules cache key
        shell: pwsh
        run: |
          mkdir .build -ea 0
          node build/azure-pipelines/common/computeNodeModulesCacheKey.ts win32 arm64 $(node -p process.arch) > .build/packagelockhash

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        id: node-modules-cache
        with:
          path: .build/node_modules_cache
          key: "node_modules-windows-arm64-${{ hashFiles('.build/packagelockhash') }}"

      - name: Extract node_modules cache
        if: steps.node-modules-cache.outputs.cache-hit == 'true'
        shell: pwsh
        run: 7z.exe x .build/node_modules_cache/cache.7z -aoa

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          for ($i = 1; $i -le 5; $i++) {
            try {
              npm ci
              break
            }
            catch {
              if ($i -eq 5) {
                Write-Error "npm ci failed after 5 attempts"
                throw
              }
              Write-Host "npm ci failed attempt $i, retrying..."
              Start-Sleep -Seconds 2
            }
          }
        env:
          npm_config_arch: arm64
          npm_config_foreground_scripts: "true"
          VSCODE_ARCH: arm64
          npm_config_build_from_source: "false"
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

      - name: Create node_modules archive
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          node build/azure-pipelines/common/listNodeModules.ts .build/node_modules_list.txt
          mkdir -Force .build/node_modules_cache
          7z.exe a .build/node_modules_cache/cache.7z -mx3 `@.build/node_modules_list.txt

      - name: Create .build folder
        shell: pwsh
        run: mkdir .build -ea 0

      - name: Prepare built-in extensions cache key
        shell: pwsh
        run: node build/azure-pipelines/common/computeBuiltInDepsCacheKey.ts > .build/builtindepshash

      - name: Restore built-in extensions cache
        id: cache-builtin-extensions
        uses: actions/cache/restore@v5
        with:
          enableCrossOsArchive: true
          path: .build/builtInExtensions
          key: "builtin-extensions-${{ hashFiles('.build/builtindepshash') }}"

      - name: Download built-in extensions
        if: steps.cache-builtin-extensions.outputs.cache-hit != 'true'
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile
        shell: pwsh
        run: npm run gulp compile

      - name: Build Windows arm64 Application
        shell: pwsh
        run: npm run gulp vscode-win32-arm64

      - name: Prepare Windows arm64 Inno Updater
        shell: pwsh
        run: npm run gulp vscode-win32-arm64-inno-updater

      - name: Build Windows arm64 User Setup
        shell: pwsh
        run: npm run gulp vscode-win32-arm64-user-setup

      - name: Build Windows arm64 System Setup
        shell: pwsh
        run: npm run gulp vscode-win32-arm64-system-setup

      - name: Upload User Setup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-win32-arm64-user-setup
          path: .build/win32-arm64/user-setup/*.exe

      - name: Upload System Setup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-win32-arm64-system-setup
          path: .build/win32-arm64/system-setup/*.exe

  build-darwin:
    name: Build macOS
    runs-on: macos-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && (contains('darwin,all', github.event.inputs.platforms) || github.event.inputs.platforms == '')) ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/heads/dependabot/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Prepare node_modules cache key
        run: |
          mkdir -p .build
          node build/azure-pipelines/common/computeNodeModulesCacheKey.ts darwin x64 $(node -p process.arch) > .build/packagelockhash

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        id: node-modules-cache
        with:
          path: .build/node_modules_cache
          key: "node_modules-darwin-x64-${{ hashFiles('.build/packagelockhash') }}"

      - name: Extract node_modules cache
        if: steps.node-modules-cache.outputs.cache-hit == 'true'
        run: tar -xzf .build/node_modules_cache/cache.tgz

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          for i in {1..5}; do
            npm ci && break
            if [ $i -eq 5 ]; then
              echo "Npm install failed too many times" >&2
              exit 1
            fi
            echo "Npm install failed $i, trying again..."
          done
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          npm_config_build_from_source: "false"

      - name: Create node_modules archive
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          node build/azure-pipelines/common/listNodeModules.ts .build/node_modules_list.txt
          mkdir -p .build/node_modules_cache
          tar -czf .build/node_modules_cache/cache.tgz --files-from .build/node_modules_list.txt

      - name: Create .build folder
        run: mkdir -p .build

      - name: Prepare built-in extensions cache key
        run: node build/azure-pipelines/common/computeBuiltInDepsCacheKey.ts > .build/builtindepshash

      - name: Restore built-in extensions cache
        id: cache-builtin-extensions
        uses: actions/cache/restore@v5
        with:
          enableCrossOsArchive: true
          path: .build/builtInExtensions
          key: "builtin-extensions-${{ hashFiles('.build/builtindepshash') }}"

      - name: Download built-in extensions
        if: steps.cache-builtin-extensions.outputs.cache-hit != 'true'
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile
        run: npm run gulp compile

      - name: Build macOS x64
        run: npm run gulp vscode-darwin-x64

      - name: Build macOS arm64
        run: npm run gulp vscode-darwin-arm64

      - name: Create macOS x64 archive
        run: |
          ditto -c -k --sequesterRsrc --keepParent ../VSCode-darwin-x64 .build/VSCode-darwin-x64.zip

      - name: Create macOS arm64 archive
        run: |
          ditto -c -k --sequesterRsrc --keepParent ../VSCode-darwin-arm64 .build/VSCode-darwin-arm64.zip

      - name: Upload x64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-darwin-x64
          path: .build/VSCode-darwin-x64.zip

      - name: Upload arm64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-darwin-arm64
          path: .build/VSCode-darwin-arm64.zip


  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    if: >-
      (github.event_name == 'workflow_dispatch' && (contains('linux,all', github.event.inputs.platforms) || github.event.inputs.platforms == '')) ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/heads/dependabot/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install system dependencies
        run: |
          sudo apt update -y
          sudo apt install -y build-essential pkg-config libx11-dev libx11-xcb-dev libxkbfile-dev libnotify-bin libkrb5-dev libsecret-1-dev libxshmfence-dev dpkg-dev fakeroot rpm

      - name: Prepare node_modules cache key
        run: |
          mkdir -p .build
          node build/azure-pipelines/common/computeNodeModulesCacheKey.ts linux x64 $(node -p process.arch) > .build/packagelockhash

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        id: node-modules-cache
        with:
          path: .build/node_modules_cache
          key: "node_modules-linux-x64-${{ hashFiles('.build/packagelockhash') }}"

      - name: Extract node_modules cache
        if: steps.node-modules-cache.outputs.cache-hit == 'true'
        run: tar -xzf .build/node_modules_cache/cache.tgz

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          for i in {1..5}; do
            npm ci && break
            if [ $i -eq 5 ]; then
              echo "Npm install failed too many times" >&2
              exit 1
            fi
            echo "Npm install failed $i, trying again..."
          done
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          npm_config_build_from_source: "false"

      - name: Create node_modules archive
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          node build/azure-pipelines/common/listNodeModules.ts .build/node_modules_list.txt
          mkdir -p .build/node_modules_cache
          tar -czf .build/node_modules_cache/cache.tgz --files-from .build/node_modules_list.txt

      - name: Create .build folder
        run: mkdir -p .build

      - name: Prepare built-in extensions cache key
        run: node build/azure-pipelines/common/computeBuiltInDepsCacheKey.ts > .build/builtindepshash

      - name: Restore built-in extensions cache
        id: cache-builtin-extensions
        uses: actions/cache/restore@v5
        with:
          enableCrossOsArchive: true
          path: .build/builtInExtensions
          key: "builtin-extensions-${{ hashFiles('.build/builtindepshash') }}"

      - name: Download built-in extensions
        if: steps.cache-builtin-extensions.outputs.cache-hit != 'true'
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile
        run: npm run gulp compile

      - name: Compile CLI
        run: npm run gulp compile-cli

      - name: Build Linux x64
        run: |
          npm run gulp "vscode-linux-x64-min"

      - name: Build Linux arm64
        run: |
          npm run gulp "vscode-linux-arm64-min"

      - name: Mix in CLI for x64
        run: |
          set -e
          CLI_APP_NAME=$(node -p "require('./product.json').tunnelApplicationName")
          # CLI binary is built as 'code' by Rust
          # Ensure the bin directory exists
          mkdir -p ../VSCode-linux-x64/bin
          # Copy and rename the CLI binary
          if [ -f cli/target/release/code ]; then
            cp cli/target/release/code ../VSCode-linux-x64/bin/$CLI_APP_NAME
          elif [ -f cli/target/debug/code ]; then
            cp cli/target/debug/code ../VSCode-linux-x64/bin/$CLI_APP_NAME
          else
            echo "Error: CLI binary not found"
            ls -la cli/target/release/ || ls -la cli/target/debug/ || echo "No target directory"
            exit 1
          fi
          chmod +x ../VSCode-linux-x64/bin/$CLI_APP_NAME

      - name: Mix in CLI for arm64
        run: |
          set -e
          CLI_APP_NAME=$(node -p "require('./product.json').tunnelApplicationName")
          mkdir -p ../VSCode-linux-arm64/bin
          # For arm64, use the same x64 binary for now (needs proper cross-compilation)
          if [ -f cli/target/release/code ]; then
            cp cli/target/release/code ../VSCode-linux-arm64/bin/$CLI_APP_NAME
          elif [ -f cli/target/debug/code ]; then
            cp cli/target/debug/code ../VSCode-linux-arm64/bin/$CLI_APP_NAME
          else
            echo "Warning: CLI binary not found for arm64, skipping"
          fi
          chmod +x ../VSCode-linux-arm64/bin/$CLI_APP_NAME 2>/dev/null || true

      - name: Create Linux x64 archive
        run: |
          tar -czf .build/VSCode-linux-x64.tar.gz -C .. VSCode-linux-x64

      - name: Create Linux arm64 archive
        run: |
          tar -czf .build/VSCode-linux-arm64.tar.gz -C .. VSCode-linux-arm64

      # test-workbench_change start - Debian package build
      - name: Prepare Debian package (x64)
        run: npm run gulp vscode-linux-x64-prepare-deb

      - name: Build Debian package (x64)
        run: npm run gulp vscode-linux-x64-build-deb

      - name: Prepare Debian package (arm64)
        run: npm run gulp vscode-linux-arm64-prepare-deb

      - name: Build Debian package (arm64)
        run: npm run gulp vscode-linux-arm64-build-deb

      - name: Find Debian packages
        id: find-deb
        run: |
          DEB_X64=$(find .build/linux/deb/amd64/deb -name "*.deb" | head -n 1)
          DEB_ARM64=$(find .build/linux/deb/arm64/deb -name "*.deb" | head -n 1)
          echo "deb_x64=$DEB_X64" >> $GITHUB_OUTPUT
          echo "deb_arm64=$DEB_ARM64" >> $GITHUB_OUTPUT
          echo "Found x64 deb: $DEB_X64"
          echo "Found arm64 deb: $DEB_ARM64"

      - name: Display Debian package info (x64)
        if: steps.find-deb.outputs.deb_x64 != ''
        run: |
          echo "=== x64 Debian Package Info ==="
          dpkg-deb -I ${{ steps.find-deb.outputs.deb_x64 }}

      - name: Display Debian package info (arm64)
        if: steps.find-deb.outputs.deb_arm64 != ''
        run: |
          echo "=== arm64 Debian Package Info ==="
          dpkg-deb -I ${{ steps.find-deb.outputs.deb_arm64 }}
      # test-workbench_change end

      - name: Upload x64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-linux-x64
          path: .build/VSCode-linux-x64.tar.gz

      - name: Upload arm64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-linux-arm64
          path: .build/VSCode-linux-arm64.tar.gz

      # test-workbench_change start - Upload Debian packages
      - name: Upload x64 Debian package
        if: steps.find-deb.outputs.deb_x64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: vscode-linux-x64-deb
          path: ${{ steps.find-deb.outputs.deb_x64 }}

      - name: Upload arm64 Debian package
        if: steps.find-deb.outputs.deb_arm64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: vscode-linux-arm64-deb
          path: ${{ steps.find-deb.outputs.deb_arm64 }}
      # test-workbench_change end
